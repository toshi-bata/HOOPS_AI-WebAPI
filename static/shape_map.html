<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shape Space Map</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; font-family: "Segoe UI", sans-serif; }
    #viewer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f4f4f7; }

    /* SVG edge overlay */
    #edgeSvg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 4; }

    /* Label overlay */
    #labels { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }
    .part-label {
      position: absolute; transform: translate(-50%, -120%);
      background: rgba(30, 30, 46, 0.82); color: #f8f8f2;
      padding: 2px 8px; border-radius: 5px; font-size: 12px; white-space: nowrap;
      pointer-events: none;
    }

    /* Control panel */
    #panel {
      position: fixed; top: 14px; left: 14px; z-index: 10;
      background: rgba(255, 255, 255, 0.92); border: 1px solid #ddd; border-radius: 8px;
      padding: 12px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); min-width: 270px;
    }
    #panel h1 { font-size: 15px; margin: 0 0 8px; }
    #panel .row { display: flex; align-items: center; gap: 8px; margin: 5px 0; font-size: 13px; }
    #panel .row label { white-space: nowrap; }
    #panel input[type="range"] { flex: 1; }
    #panel hr { border: none; border-top: 1px solid #eee; margin: 8px 0; }
    #stress { font-size: 12px; color: #555; margin-top: 6px; }
    #scaleValue { min-width: 42px; text-align: right; font-variant-numeric: tabular-nums; }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .toggle { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #ccc; border-radius: 18px; transition: .2s;
    }
    .toggle-slider:before {
      content: ""; position: absolute;
      width: 12px; height: 12px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: .2s;
    }
    .toggle input:checked + .toggle-slider { background: #4a90d9; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }

    /* Spinner */
    #spinner {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20;
      background: #1e1e2e; color: #f8f8f2; padding: 1.4em 2em; border-radius: 10px;
      font-size: 14px; text-align: center;
    }
    #spinner .dot {
      display: inline-block; width: 10px; height: 10px; margin-left: 8px; border-radius: 50%;
      border: 3px solid #888; border-top-color: #fff; animation: spin 0.9s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #errorMsg {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #1e1e2e; color: #f8f8f2; padding: 1.6em 2em; border-radius: 10px;
      border: 1px solid #ff5555; max-width: 480px; text-align: center; z-index: 30;
    }
    #errorMsg h2 { color: #ff5555; margin: 0 0 .5em; }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <svg id="edgeSvg"></svg>
  <div id="labels"></div>

  <div id="panel">
    <h1>Shape Space Map</h1>
    <div class="row">
      <label for="scale">Scale</label>
      <input id="scale" type="range" min="0" max="100" value="0" step="1">
      <span id="scaleValue">1.0ﾃ・/span>
    </div>
    <div class="row">
      <label for="maxMult">Max ﾃ・/label>
      <input id="maxMult" type="number" min="2" max="10000" value="100" step="1"
             style="width:70px;padding:2px 4px;font-size:13px;border:1px solid #ccc;border-radius:4px;">
    </div>
    <hr>
    <div class="row toggle-wrap">
      <label class="toggle"><input id="toggleLabels" type="checkbox" checked><span class="toggle-slider"></span></label>
      <span>Part names</span>
    </div>
    <div class="row toggle-wrap">
      <label class="toggle"><input id="toggleEdges" type="checkbox" checked><span class="toggle-slider"></span></label>
      <span>Similarity edges</span>
    </div>
    <div class="row" id="threshRow" style="padding-left:42px;">
      <label for="edgeThresh" style="font-size:12px;color:#555;">Min similarity</label>
      <input id="edgeThresh" type="number" min="0" max="1" value="0.5" step="0.05"
             style="width:55px;padding:2px 4px;font-size:12px;border:1px solid #ccc;border-radius:4px;">
    </div>
    <div id="stress">Layout accuracy: -</div>
  </div>

  <div id="spinner">Loading<span class="dot"></span></div>
  <div id="errorMsg"><h2>Error</h2><p id="errorDetail"></p></div>

  <script type="module">
    import { WebViewer, Matrix, Point3 } from '/static/hoops-web-viewer-monolith.mjs';

    const params = new URLSearchParams(window.location.search);
    const mapId = params.get('map');
    const minGap = parseFloat(params.get('min_gap') || '0');

    const spinner      = document.getElementById('spinner');
    const errorBox     = document.getElementById('errorMsg');
    const errorDetail  = document.getElementById('errorDetail');
    const labelsRoot   = document.getElementById('labels');
    const edgeSvg      = document.getElementById('edgeSvg');
    const scaleSlider  = document.getElementById('scale');
    const scaleValueEl = document.getElementById('scaleValue');
    const stressEl     = document.getElementById('stress');
    const maxMultInput = document.getElementById('maxMult');
    const toggleLabels = document.getElementById('toggleLabels');
    const toggleEdges  = document.getElementById('toggleEdges');
    const edgeThresh   = document.getElementById('edgeThresh');

    function showError(msg) {
      spinner.style.display = 'none';
      errorDetail.textContent = msg;
      errorBox.style.display = 'block';
    }

    if (!mapId) {
      showError("Missing 'map' query parameter (e.g. ?map=abcd1234).");
      throw new Error("missing map param");
    }

    // Runtime state
    let hwv = null;
    let mapData = null;
    const partState = [];   // { nodeId, position, center, diag, label }
    let baseScale = 1;
    let currentScale = 1;
    let showLabels = true;
    let showEdges  = true;

    // 笏笏 Toggle handlers 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
    toggleLabels.addEventListener('change', () => {
      showLabels = toggleLabels.checked;
      updateOverlays();
    });
    toggleEdges.addEventListener('change', () => {
      showEdges = toggleEdges.checked;
      document.getElementById('threshRow').style.display = showEdges ? '' : 'none';
      updateEdges();
    });
    edgeThresh.addEventListener('change', updateEdges);

    // 笏笏 Positioning 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
    function applyPositions() {
      if (!hwv) return;
      for (const st of partState) {
        if (st.nodeId == null) continue;
        const p = st.position, c = st.center;
        try {
          const m = new Matrix();
          m.setTranslationComponent(
            p[0] * currentScale - c[0],
            p[1] * currentScale - c[1],
            p[2] * currentScale - c[2]
          );
          hwv.model.setNodeMatrix(st.nodeId, m, true);
        } catch (e) {}
      }
      updateOverlays();
    }

    // 笏笏 Project all parts to screen, return array of {x,y,visible} 笏笏笏笏笏笏笏笏笏笏
    function projectAll() {
      return partState.map(st => {
        try {
          const p = st.position;
          const s = hwv.view.projectPoint(new Point3(p[0]*currentScale, p[1]*currentScale, p[2]*currentScale));
          return (s && s.z > 0) ? { x: s.x, y: s.y, visible: true } : { visible: false };
        } catch (e) { return { visible: false }; }
      });
    }

    // 笏笏 Labels 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
    function updateLabels(screenPts) {
      partState.forEach((st, i) => {
        if (!st.label) return;
        const s = screenPts[i];
        st.label.style.display = (showLabels && s.visible) ? 'block' : 'none';
        if (s.visible) { st.label.style.left = s.x + 'px'; st.label.style.top = s.y + 'px'; }
      });
    }

    // 笏笏 SVG edges 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
    function updateEdges(screenPts) {
      edgeSvg.innerHTML = '';
      if (!showEdges || !mapData) return;
      const thresh = parseFloat(edgeThresh.value) || 0;
      const n = partState.length;
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          const sim = mapData.matrix[i][j];
          if (sim < thresh) continue;
          const a = screenPts[i], b = screenPts[j];
          if (!a.visible || !b.visible) continue;
          // color: green(high sim) 竊・red(low sim) via hue
          const hue = Math.round(sim * 120);   // 0=red, 120=green
          const opacity = 0.2 + sim * 0.7;     // 0.2 窶・0.9
          const width = 0.5 + sim * 3;         // 0.5 窶・3.5 px
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
          line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
          line.setAttribute('stroke', `hsl(${hue},80%,45%)`);
          line.setAttribute('stroke-width', width);
          line.setAttribute('stroke-opacity', opacity);
          edgeSvg.appendChild(line);

          // similarity score midpoint label
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', (a.x + b.x) / 2);
          text.setAttribute('y', (a.y + b.y) / 2 - 4);
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('font-size', '11');
          text.setAttribute('fill', `hsl(${hue},70%,30%)`);
          text.setAttribute('fill-opacity', opacity);
          text.textContent = sim.toFixed(3);
          edgeSvg.appendChild(text);
        }
      }
    }

    // 笏笏 Combined overlay update 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
    function updateOverlays() {
      if (!hwv) return;
      const pts = projectAll();
      updateLabels(pts);
      updateEdges(pts);
    }

    // 笏笏 Scale 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
    function vecLen(v) { return Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]); }

    function computeInitialScale() {
      let maxDiag = 0;
      for (const st of partState) if (st.diag > maxDiag) maxDiag = st.diag;
      let minDist = Infinity;
      const n = partState.length;
      for (let i = 0; i < n; i++)
        for (let j = i + 1; j < n; j++) {
          const a = partState[i].position, b = partState[j].position;
          const d = Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2);
          if (d > 1e-9 && d < minDist) minDist = d;
        }
      let s = (minDist !== Infinity && minDist > 0 && maxDiag > 0) ? maxDiag / minDist : 1;
      return Math.min(500, Math.max(1, s)) * 5;
    }

    function setupSlider() {
      baseScale = computeInitialScale();
      currentScale = baseScale;
      scaleSlider.min = 0; scaleSlider.max = 100; scaleSlider.value = 0;
      updateScaleLabel();
      function applySlider() {
        const mult = Math.max(2, parseInt(maxMultInput.value) || 100);
        const t = parseFloat(scaleSlider.value) / 100;
        currentScale = baseScale * (1 + t * (mult - 1));
        updateScaleLabel();
        applyPositions();
      }
      scaleSlider.addEventListener('input', applySlider);
      maxMultInput.addEventListener('change', applySlider);
    }

    function updateScaleLabel() {
      scaleValueEl.textContent = (currentScale / baseScale).toFixed(1) + 'x';
    }

    function setStress(stress) {
      const s = Number(stress) || 0;
      stressEl.textContent = s < 0.01
        ? `Layout accuracy: exact (stress=${s.toFixed(3)})`
        : `Layout accuracy: approximate (stress=${s.toFixed(3)})`;
    }

    // 笏笏 Main 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
    async function main() {
      let resp;
      try { resp = await fetch(`/out/shape_map_${mapId}.json`); }
      catch (e) { showError("Failed to fetch map data: " + e.message); return; }
      if (!resp.ok) { showError(`Map data not found (HTTP ${resp.status}).`); return; }
      mapData = await resp.json();
      setStress(mapData.stress);

      const validParts = mapData.parts.filter(p => p.scs_url);
      if (validParts.length === 0) { showError("No displayable parts (SCS files) found."); return; }

      const container = document.getElementById('viewer');
      hwv = new WebViewer({ container, endpointUri: validParts[0].scs_url });

      hwv.setCallbacks({
        sceneReady: function () {
          hwv.focusInput(true);
          container.addEventListener('mouseenter', () => hwv.focusInput(true));
          window.addEventListener('resize', () => { hwv.resizeCanvas(); updateOverlays(); });
          if (hwv.view.getAxisTriad) hwv.view.getAxisTriad().enable();
          if (hwv.view.getNavCube) hwv.view.getNavCube().enable();
        },
        camera: function () { updateOverlays(); },
        modelStructureReady: async function () {
          try {
            const rootNode = hwv.model.getAbsoluteRootNode();
            const rootChildren = hwv.model.getNodeChildren(rootNode);
            const firstNodeId = rootChildren.length > 0 ? rootChildren[0] : rootNode;
            const loadedParts = [{ nodeId: firstNodeId, part: validParts[0] }];

            if (validParts.length > 1) {
              const rest = await Promise.all(validParts.slice(1).map(async (part) => {
                const nodeId = hwv.model.createNode(rootNode, part.filename);
                await hwv.model.loadSubtreeFromScsFile(nodeId, part.scs_url);
                return { nodeId, part };
              }));
              loadedParts.push(...rest);
            }

            for (const { nodeId, part } of loadedParts) {
              let center = [0,0,0], diag = 0;
              try {
                const box = await hwv.model.getNodeRealBoundingBox(nodeId);
                center = [(box.min.x+box.max.x)/2, (box.min.y+box.max.y)/2, (box.min.z+box.max.z)/2];
                diag = Math.sqrt((box.max.x-box.min.x)**2+(box.max.y-box.min.y)**2+(box.max.z-box.min.z)**2);
              } catch (e) {}
              const label = document.createElement('div');
              label.className = 'part-label';
              label.textContent = part.filename;
              labelsRoot.appendChild(label);
              partState.push({ nodeId, position: part.position, center, diag, label });
            }

            setupSlider();
            applyPositions();
            if (hwv.view.fitWorld) hwv.view.fitWorld();
            spinner.style.display = 'none';
          } catch (e) {
            showError("Failed to load models: " + (e.message || e));
          }
        },
      });

      try {
        const started = hwv.start();
        if (started && typeof started.catch === 'function')
          started.catch(err => showError(err.message || String(err)));
      } catch (err) { showError(err.message || String(err)); }
    }

    main();
  </script>
</body>
</html>
