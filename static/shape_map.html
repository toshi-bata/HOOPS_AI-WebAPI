<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shape Space Map</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; font-family: "Segoe UI", sans-serif; }
    #viewer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f4f4f7; }
    #edgeSvg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 4; }
    #labels  { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }
    .part-label {
      position: absolute; transform: translate(-50%, -120%);
      color: #fff; padding: 2px 8px; border-radius: 5px; font-size: 12px; white-space: nowrap;
      pointer-events: none; border: 1px solid rgba(255,255,255,0.4);
    }
    #panel {
      position: fixed; top: 14px; left: 14px; z-index: 10;
      background: rgba(255,255,255,0.93); border: 1px solid #ddd; border-radius: 8px;
      padding: 12px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); min-width: 270px;
    }
    #panel h1 { font-size: 15px; margin: 0 0 8px; }
    #panel .row { display: flex; align-items: center; gap: 8px; margin: 5px 0; font-size: 13px; }
    #panel .row label { white-space: nowrap; }
    #panel input[type="range"] { flex: 1; }
    #panel hr { border: none; border-top: 1px solid #eee; margin: 8px 0; }
    #stress { font-size: 12px; color: #555; margin-top: 6px; }
    #scaleValue, #partScaleValue { min-width: 42px; text-align: right; font-variant-numeric: tabular-nums; }
    .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .toggle { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #ccc; border-radius: 18px; transition: .2s;
    }
    .toggle-slider:before {
      content: ""; position: absolute; width: 12px; height: 12px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: .2s;
    }
    .toggle input:checked + .toggle-slider { background: #4a90d9; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }
    .panel-btn {
      padding: 4px 10px; font-size: 12px; border: 1px solid #bbb; border-radius: 4px;
      background: #f5f5f5; cursor: pointer; white-space: nowrap;
    }
    .panel-btn:hover { background: #e8e8e8; }
    .panel-btn:disabled { opacity: 0.5; cursor: default; }
    .panel-btn.primary { background: #4a90d9; color: white; border-color: #3a7bc8; }
    .panel-btn.primary:hover { background: #3a7bc8; }
    #tagModeHint { font-size: 11px; color: #888; }
    #tagDialog {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.35); align-items: center; justify-content: center;
    }
    #tagDialogBox {
      background: white; border-radius: 8px; padding: 20px 24px; min-width: 320px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    #tagDialogBox h3 { margin: 0 0 8px; font-size: 15px; }
    #tagDialogInfo { font-size: 11px; color: #666; margin: 0 0 10px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #tagInput { width: 100%; box-sizing: border-box; padding: 6px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; }
    .tag-badge {
      display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px;
      background: rgba(255,180,0,0.85); color: #333; margin-right: 2px; font-weight: bold;
    }
    #spinner {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 20;
      background: #1e1e2e; color: #f8f8f2; padding: 1.4em 2em; border-radius: 10px;
      font-size: 14px; text-align: center;
    }
    #spinner .dot {
      display: inline-block; width: 10px; height: 10px; margin-left: 8px; border-radius: 50%;
      border: 3px solid #888; border-top-color: #fff; animation: spin 0.9s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #errorMsg {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: #1e1e2e; color: #f8f8f2; padding: 1.6em 2em; border-radius: 10px;
      border: 1px solid #ff5555; max-width: 480px; text-align: center; z-index: 30;
    }
    #errorMsg h2 { color: #ff5555; margin: 0 0 .5em; }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <svg id="edgeSvg"></svg>
  <div id="labels"></div>

  <div id="panel">
    <h1>Shape Space Map</h1>
    <div class="row">
      <label for="scale">Spacing</label>
      <input id="scale" type="range" min="0" max="100" value="0" step="1">
      <span id="scaleValue">1.0x</span>
    </div>
    <div class="row">
      <label for="maxMult">Max x</label>
      <input id="maxMult" type="number" min="2" max="10000" value="200" step="1"
             style="width:70px;padding:2px 4px;font-size:13px;border:1px solid #ccc;border-radius:4px;">
    </div>
    <div class="row">
      <label for="partScale">Part</label>
      <input id="partScale" type="range" min="0.05" max="2" value="1" step="0.05">
      <span id="partScaleValue">1.00x</span>
    </div>
    <hr>
    <div class="row toggle-wrap">
      <label class="toggle"><input id="toggleLabels" type="checkbox"><span class="toggle-slider"></span></label>
      <span>Part names</span>
    </div>
    <div class="row toggle-wrap">
      <label class="toggle"><input id="toggleEdges" type="checkbox" checked><span class="toggle-slider"></span></label>
      <span>Similarity edges</span>
    </div>
    <div class="row toggle-wrap">
      <label class="toggle"><input id="toggleCluster" type="checkbox" checked><span class="toggle-slider"></span></label>
      <span>Cluster colors</span>
    </div>
    <div class="row" id="threshRow">
      <label for="edgeThresh" style="font-size:12px;color:#555;white-space:nowrap;">Min sim</label>
      <input id="edgeThresh" type="range" min="0.05" max="1" value="0.5" step="0.01" style="flex:1;">
      <input id="edgeThreshValue" type="number" min="0.05" max="1" value="0.5" step="0.01"
             style="width:52px;padding:2px 4px;font-size:12px;border:1px solid #ccc;border-radius:4px;text-align:right;font-variant-numeric:tabular-nums;">
    </div>
    <hr>
    <div class="row toggle-wrap">
      <label class="toggle"><input id="toggleTagMode" type="checkbox"><span class="toggle-slider"></span></label>
      <span>Tag Cluster</span>
    </div>
    <div id="tagModeHint" class="row" style="display:none;">
      <span id="tagModeHintText" style="font-size:11px;color:#888;">Click a part to name its cluster</span>
    </div>
    <div id="saveTagsRow" class="row" style="display:none; gap:6px; flex-wrap:wrap;">
      <button class="panel-btn primary" id="saveTagsBtn">Save Tags</button>
      <span id="saveTagsStatus" style="font-size:11px;color:#555;"></span>
    </div>
    <hr>
    <div class="row" style="font-size:12px;color:#555;font-weight:600;">Register to Index</div>
    <div class="row" style="gap:6px;">
      <label style="font-size:12px;white-space:nowrap;">Index</label>
      <input id="indexNameInput" type="text" placeholder="my-index"
             style="flex:1;padding:3px 6px;font-size:12px;border:1px solid #ccc;border-radius:4px;">
    </div>
    <div class="row" style="gap:6px; flex-wrap:wrap;">
      <button class="panel-btn primary" id="addToIndexBtn">Register</button>
      <span id="addToIndexStatus" style="font-size:11px;color:#555;"></span>
    </div>
    <div id="stress">Layout accuracy: -</div>
  </div>

  <!-- Cluster tag dialog -->
  <div id="tagDialog">
    <div id="tagDialogBox">
      <h3>Name this cluster</h3>
      <div id="tagDialogInfo"></div>
      <input id="tagInput" type="text" placeholder="e.g. bush, flange, bracket">
      <div style="display:flex; gap:8px; margin-top:12px; justify-content:flex-end;">
        <button class="panel-btn" id="tagCancelBtn">Cancel</button>
        <button class="panel-btn primary" id="tagOkBtn">OK</button>
      </div>
    </div>
  </div>

  <div id="spinner">Loading<span class="dot"></span></div>
  <div id="errorMsg"><h2>Error</h2><p id="errorDetail"></p></div>

  <script type="module">
    import { WebViewer, Matrix, Point3, Color } from '/static/hoops-web-viewer-monolith.mjs';

    const params       = new URLSearchParams(window.location.search);
    const mapId        = params.get('map');

    const spinner         = document.getElementById('spinner');
    const errorBox        = document.getElementById('errorMsg');
    const errorDetail     = document.getElementById('errorDetail');
    const labelsRoot      = document.getElementById('labels');
    const edgeSvg         = document.getElementById('edgeSvg');
    const scaleSlider     = document.getElementById('scale');
    const scaleValueEl    = document.getElementById('scaleValue');
    const partScaleSlider = document.getElementById('partScale');
    const partScaleValueEl = document.getElementById('partScaleValue');
    const stressEl        = document.getElementById('stress');
    const maxMultInput    = document.getElementById('maxMult');
    const toggleLabels    = document.getElementById('toggleLabels');
    const toggleEdges     = document.getElementById('toggleEdges');
    const toggleCluster   = document.getElementById('toggleCluster');
    const edgeThresh      = document.getElementById('edgeThresh');
    const edgeThreshValue = document.getElementById('edgeThreshValue');

    function showError(msg) {
      spinner.style.display = 'none';
      errorDetail.textContent = msg;
      errorBox.style.display = 'block';
    }

    if (!mapId) { showError("Missing 'map' query parameter."); throw new Error("missing map"); }

    // Cluster color palette — CSS hex + matching HOOPS Color (0-255 RGB)
    const CLUSTER_CSS  = ['#2980b9','#27ae60','#d35400','#8e44ad','#c0006a','#0097a7','#b8860b','#c0392b'];
    const CLUSTER_HOOPS = CLUSTER_CSS.map(h => new Color(
      parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)
    ));

    // Query-part highlight (magenta)
    const QUERY_CSS   = '#ff00ff';
    const QUERY_HOOPS = new Color(255, 0, 255);

    // Runtime state
    let hwv = null;
    let mapData = null;
    const partState = [];
    let baseScale = 1;
    let currentScale = 1;
    let currentPartScale = 1.0;
    let showLabels  = false;
    let showEdges   = true;
    let showCluster = true;

    // ── Cluster tagging state ────────────────────────────────────────────────
    const clusterTags = {};          // clusterIndex → tagName
    let tagModeActive = false;
    let pendingClusterIndex = null;
    let pendingPartIndices  = [];

    const toggleTagMode    = document.getElementById('toggleTagMode');
    const tagModeHint      = document.getElementById('tagModeHint');
    const saveTagsRow      = document.getElementById('saveTagsRow');
    const saveTagsBtn      = document.getElementById('saveTagsBtn');
    const saveTagsStatus   = document.getElementById('saveTagsStatus');
    const tagDialog        = document.getElementById('tagDialog');
    const tagDialogInfo    = document.getElementById('tagDialogInfo');
    const tagInput         = document.getElementById('tagInput');
    const tagOkBtn         = document.getElementById('tagOkBtn');
    const tagCancelBtn     = document.getElementById('tagCancelBtn');
    const indexNameInput   = document.getElementById('indexNameInput');
    const addToIndexBtn    = document.getElementById('addToIndexBtn');
    const addToIndexStatus = document.getElementById('addToIndexStatus');

    toggleTagMode.addEventListener('change', () => {
      tagModeActive = toggleTagMode.checked;
      tagModeHint.style.display = tagModeActive ? '' : 'none';
      if (!tagModeActive) tagDialog.style.display = 'none';
    });

    // ── Show tag dialog for a cluster ────────────────────────────────────────
    function openTagDialog(clusterIdx, partIndices) {
      pendingClusterIndex = clusterIdx;
      pendingPartIndices  = partIndices;
      const existing = clusterTags[clusterIdx] || '';
      tagInput.value = existing;
      const names = partIndices.slice(0,4).map(i => mapData.parts[i]?.filename || '').filter(Boolean);
      const extra = partIndices.length > 4 ? ` …+${partIndices.length - 4} more` : '';
      tagDialogInfo.textContent = `${partIndices.length} part(s): ${names.join(', ')}${extra}`;
      tagDialog.style.display = 'flex';
      tagInput.focus();
      tagInput.select();
    }

    tagOkBtn.addEventListener('click', () => {
      const tag = tagInput.value.trim();
      if (tag && pendingClusterIndex !== null) {
        clusterTags[pendingClusterIndex] = tag;
        updateClusterTagLabels();
        saveTagsRow.style.display = '';
      }
      tagDialog.style.display = 'none';
      pendingClusterIndex = null;
    });

    tagCancelBtn.addEventListener('click', () => {
      tagDialog.style.display = 'none';
      pendingClusterIndex = null;
    });

    tagInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') tagOkBtn.click();
      if (e.key === 'Escape') tagCancelBtn.click();
    });

    // ── Update label text to include cluster tag badge ───────────────────────
    function updateClusterTagLabels() {
      if (!mapData) return;
      const thresh   = parseFloat(edgeThresh.value) || 0;
      const clusters = computeClusters(mapData.matrix, thresh);
      partState.forEach((st, i) => {
        if (!st.label) return;
        const tag      = clusterTags[clusters[i]];
        const filename = mapData.parts[i]?.filename || '';
        st.label.innerHTML = tag
          ? `<span class="tag-badge">${tag}</span>${filename}`
          : filename;
      });
    }

    // ── HOOPS node → partState index (walks up tree) ─────────────────────────
    function findPartIndexByNode(nodeId) {
      if (!hwv) return -1;
      const nodeIds = new Set(partState.map(st => st.nodeId));
      let current = nodeId;
      for (let depth = 0; depth < 20 && current != null; depth++) {
        if (nodeIds.has(current)) return partState.findIndex(st => st.nodeId === current);
        try { current = hwv.model.getNodeParent(current); }
        catch(e) { break; }
      }
      return -1;
    }

    // ── Save tags to backend ─────────────────────────────────────────────────
    saveTagsBtn.addEventListener('click', async () => {
      if (!mapData || !Object.keys(clusterTags).length) return;
      const thresh   = parseFloat(edgeThresh.value) || 0;
      const clusters = computeClusters(mapData.matrix, thresh);
      const tags = {};
      partState.forEach((st, i) => {
        const tag = clusterTags[clusters[i]];
        if (tag && mapData.parts[i]?.file_id) tags[mapData.parts[i].file_id] = tag;
      });
      if (!Object.keys(tags).length) return;
      saveTagsStatus.textContent = 'Saving…';
      try {
        const resp = await fetch(`/similarity/map/${mapData.map_id}/cluster-tags`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({tags}),
        });
        if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error(e.detail || `HTTP ${resp.status}`); }
        const r = await resp.json();
        saveTagsStatus.textContent = `✓ ${r.tagged} part(s) tagged`;
        setTimeout(() => saveTagsStatus.textContent = '', 3000);
      } catch(e) { saveTagsStatus.textContent = `Error: ${e.message}`; }
    });

    // ── Register to index ────────────────────────────────────────────────────
    addToIndexBtn.addEventListener('click', async () => {
      const indexName = indexNameInput.value.trim();
      if (!indexName || !mapData) {
        addToIndexStatus.textContent = indexName ? 'No map loaded.' : 'Enter an index name.';
        return;
      }
      addToIndexStatus.textContent = 'Registering…';
      addToIndexBtn.disabled = true;
      try {
        const resp = await fetch(
          `/similarity/map/${mapData.map_id}/add-to-index?index_name=${encodeURIComponent(indexName)}`,
          { method: 'POST' }
        );
        if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error(e.detail || `HTTP ${resp.status}`); }
        const r = await resp.json();
        const created = r.index_created ? ' (new index created)' : '';
        addToIndexStatus.textContent = `✓ Added ${r.added}, Updated ${r.updated}${created}`;
        setTimeout(() => addToIndexStatus.textContent = '', 4000);
      } catch(e) { addToIndexStatus.textContent = `Error: ${e.message}`; }
      finally { addToIndexBtn.disabled = false; }
    });

    // ── Union-Find cluster detection ────────────────────────────────────────
    function computeClusters(matrix, threshold) {
      const n = matrix.length;
      const parent = Array.from({length: n}, (_, i) => i);
      function find(x) { return parent[x] === x ? x : (parent[x] = find(parent[x])); }
      function union(a, b) { parent[find(a)] = find(b); }
      for (let i = 0; i < n; i++)
        for (let j = i+1; j < n; j++)
          if (matrix[i][j] >= threshold) union(i, j);
      const roots = {};
      let next = 0;
      return Array.from({length: n}, (_, i) => {
        const r = find(i);
        if (!(r in roots)) roots[r] = next++;
        return roots[r];
      });
    }

    // ── Apply cluster colors to geometry + labels ───────────────────────────
    function applyClusterColors() {
      if (!hwv || !mapData || partState.length === 0) return;
      const thresh = parseFloat(edgeThresh.value) || 0;
      const clusters = computeClusters(mapData.matrix, thresh);
      partState.forEach((st, i) => {
        const isQuery = !!(mapData.parts[i] && mapData.parts[i].is_query);
        const css  = isQuery ? QUERY_CSS  : (showCluster ? CLUSTER_CSS[clusters[i]  % CLUSTER_CSS.length]  : 'rgba(30,30,46,0.82)');
        const hc   = isQuery ? QUERY_HOOPS : (showCluster ? CLUSTER_HOOPS[clusters[i] % CLUSTER_HOOPS.length] : null);
        // Label background
        if (st.label) {
          st.label.style.background = css + (isQuery ? '' : 'dd');
          if (isQuery) st.label.style.fontWeight = 'bold';
        }
        // 3D node color
        if (st.nodeId != null && hc) {
          try {
            hwv.model.setNodeColor(st.nodeId, hc);
          } catch(e) {
            try {
              hwv.model.setNodesFaceColor([st.nodeId], hc);
            } catch(e2) {}
          }
        } else if (st.nodeId != null && !hc) {
          try { hwv.model.unsetNodeColor(st.nodeId); } catch(e) {}
        }
      });
    }

    // ── Toggle handlers ─────────────────────────────────────────────────────
    toggleLabels.addEventListener('change', () => { showLabels = toggleLabels.checked; updateOverlays(); });
    toggleEdges.addEventListener('change', () => {
      showEdges = toggleEdges.checked;
      document.getElementById('threshRow').style.display = showEdges ? '' : 'none';
      updateEdges();
    });
    toggleCluster.addEventListener('change', () => { showCluster = toggleCluster.checked; applyClusterColors(); });
    edgeThresh.addEventListener('input', () => {
      edgeThreshValue.value = parseFloat(edgeThresh.value).toFixed(2);
      updateEdges();
      applyClusterColors();  // re-cluster on threshold change
      updateClusterTagLabels();  // reflect any tag changes after re-clustering
    });
    edgeThreshValue.addEventListener('change', () => {
      let v = parseFloat(edgeThreshValue.value);
      if (isNaN(v)) v = 0.5;
      v = Math.min(1, Math.max(0.05, v));
      edgeThreshValue.value = v.toFixed(2);
      edgeThresh.value = v;
      updateEdges();
      applyClusterColors();
      updateClusterTagLabels();
    });

    // ── Positioning ─────────────────────────────────────────────────────────
    function applyPositions() {
      if (!hwv) return;
      for (const st of partState) {
        if (st.nodeId == null) continue;
        const p = st.position, c = st.center;
        const s = currentPartScale;
        // transform(x) = s*(x - c) + p*spacing  →  translate = p*spacing - s*c
        const tx = p[0]*currentScale - s*c[0];
        const ty = p[1]*currentScale - s*c[1];
        const tz = p[2]*currentScale - s*c[2];
        try {
          const m = new Matrix();
          // Set uniform scale on diagonal (HOOPS Matrix: row-major flat array .m[16])
          if (m.m && m.m.length === 16) {
            m.m[0] = s; m.m[5] = s; m.m[10] = s;
          }
          m.setTranslationComponent(tx, ty, tz);
          hwv.model.setNodeMatrix(st.nodeId, m, true);
        } catch(e) {}
      }
      updateOverlays();
    }

    // ── Overlay helpers ──────────────────────────────────────────────────────
    function projectAll() {
      return partState.map(st => {
        try {
          const p = st.position;
          const s = hwv.view.projectPoint(new Point3(p[0]*currentScale, p[1]*currentScale, p[2]*currentScale));
          return (s && s.z > 0) ? { x: s.x, y: s.y, visible: true } : { visible: false };
        } catch(e) { return { visible: false }; }
      });
    }

    function updateLabels(pts) {
      if (!hwv) return;
      if (!pts) pts = projectAll();
      partState.forEach((st, i) => {
        if (!st.label) return;
        const s = pts[i];
        st.label.style.display = (showLabels && s.visible) ? 'block' : 'none';
        if (s.visible) { st.label.style.left = s.x + 'px'; st.label.style.top = s.y + 'px'; }
      });
    }

    function updateEdges(pts) {
      edgeSvg.innerHTML = '';
      if (!showEdges || !mapData || !hwv) return;
      if (!pts) pts = projectAll();
      const thresh = parseFloat(edgeThresh.value) || 0;
      const n = partState.length;
      for (let i = 0; i < n; i++) {
        for (let j = i+1; j < n; j++) {
          const sim = mapData.matrix[i][j];
          if (sim < thresh) continue;
          const a = pts[i], b = pts[j];
          if (!a.visible || !b.visible) continue;
          const hue = Math.round(sim * 120);
          const opacity = 0.2 + sim * 0.7;
          const line = document.createElementNS('http://www.w3.org/2000/svg','line');
          line.setAttribute('x1',a.x); line.setAttribute('y1',a.y);
          line.setAttribute('x2',b.x); line.setAttribute('y2',b.y);
          line.setAttribute('stroke',`hsl(${hue},80%,45%)`);
          line.setAttribute('stroke-width', 1);
          line.setAttribute('stroke-opacity', opacity);
          edgeSvg.appendChild(line);
          const text = document.createElementNS('http://www.w3.org/2000/svg','text');
          text.setAttribute('x',(a.x+b.x)/2); text.setAttribute('y',(a.y+b.y)/2-4);
          text.setAttribute('text-anchor','middle'); text.setAttribute('font-size','11');
          text.setAttribute('fill',`hsl(${hue},70%,30%)`); text.setAttribute('fill-opacity',opacity);
          text.textContent = sim.toFixed(3);
          edgeSvg.appendChild(text);
        }
      }
    }

    function updateOverlays() {
      if (!hwv) return;
      const pts = projectAll();
      updateLabels(pts);
      updateEdges(pts);
    }

    // ── Scale ────────────────────────────────────────────────────────────────
    function computeInitialScale() {
      let maxDiag = 0;
      for (const st of partState) if (st.diag > maxDiag) maxDiag = st.diag;
      let minDist = Infinity;
      const n = partState.length;
      for (let i = 0; i < n; i++)
        for (let j = i+1; j < n; j++) {
          const a = partState[i].position, b = partState[j].position;
          const d = Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2);
          if (d > 1e-9 && d < minDist) minDist = d;
        }
      return Math.min(500, Math.max(1, (minDist !== Infinity && minDist > 0 && maxDiag > 0) ? maxDiag/minDist : 1)) * 5;
    }

    function setupSlider() {
      baseScale = computeInitialScale();
      currentScale = baseScale;
      const _initMult = Math.max(2, parseInt(maxMultInput.value) || 200);
      scaleSlider.min = 0; scaleSlider.max = 100;
      scaleSlider.value = parseFloat((100 / _initMult).toFixed(1));
      updateScaleLabel();
      function applySlider() {
        const mult = Math.max(2, parseInt(maxMultInput.value) || 200);
        currentScale = baseScale * parseFloat(scaleSlider.value) / 100 * mult;
        updateScaleLabel();
        applyPositions();
      }
      scaleSlider.addEventListener('input', applySlider);
      maxMultInput.addEventListener('change', applySlider);

      partScaleSlider.value = 1;
      updatePartScaleLabel();
      partScaleSlider.addEventListener('input', () => {
        currentPartScale = parseFloat(partScaleSlider.value);
        updatePartScaleLabel();
        applyPositions();
      });
    }

    function updatePartScaleLabel() {
      partScaleValueEl.textContent = currentPartScale.toFixed(2) + 'x';
    }

    function updateScaleLabel() {
      scaleValueEl.textContent = (currentScale/baseScale).toFixed(1) + 'x';
    }

    function setStress(stress) {
      const s = Number(stress) || 0;
      stressEl.textContent = s < 0.01
        ? `Layout accuracy: exact (stress=${s.toFixed(3)})`
        : `Layout accuracy: approximate (stress=${s.toFixed(3)})`;
    }

    // ── Main ─────────────────────────────────────────────────────────────────
    async function main() {
      let resp;
      try { resp = await fetch(`/out/shape_map_${mapId}.json`); }
      catch(e) { showError("Failed to fetch map data: " + e.message); return; }
      if (!resp.ok) { showError(`Map data not found (HTTP ${resp.status}).`); return; }
      mapData = await resp.json();
      setStress(mapData.stress);

      const validParts = mapData.parts.filter(p => p.scs_url);
      if (!validParts.length) { showError("No displayable parts (SCS files) found."); return; }

      const container = document.getElementById('viewer');
      hwv = new WebViewer({ container, endpointUri: validParts[0].scs_url });

      hwv.setCallbacks({
        sceneReady: function() {
          hwv.focusInput(true);
          container.addEventListener('mouseenter', () => hwv.focusInput(true));
          window.addEventListener('resize', () => { hwv.resizeCanvas(); updateOverlays(); });
          if (hwv.view.getAxisTriad) hwv.view.getAxisTriad().enable();
          if (hwv.view.getNavCube)   hwv.view.getNavCube().enable();
        },
        camera: function() { updateOverlays(); },
        // Handle part selection for cluster tagging
        selectionArray: function(events) {
          if (!tagModeActive || !mapData) return;
          for (const evt of events) {
            let nodeId = null;
            try { nodeId = evt.getSelection().getNodeId(); } catch(e) { continue; }
            if (nodeId == null) continue;
            const idx = findPartIndexByNode(nodeId);
            if (idx < 0) continue;
            const thresh   = parseFloat(edgeThresh.value) || 0;
            const clusters = computeClusters(mapData.matrix, thresh);
            const clusterIdx = clusters[idx];
            const clusterPartIndices = clusters.reduce((a, c, i) => { if (c === clusterIdx) a.push(i); return a; }, []);
            openTagDialog(clusterIdx, clusterPartIndices);
            break;
          }
        },
        modelStructureReady: async function() {
          try {
            const rootNode = hwv.model.getAbsoluteRootNode();
            const rootChildren = hwv.model.getNodeChildren(rootNode);
            const firstNodeId = rootChildren.length > 0 ? rootChildren[0] : rootNode;
            const loadedParts = [{ nodeId: firstNodeId, part: validParts[0] }];

            if (validParts.length > 1) {
              const rest = await Promise.all(validParts.slice(1).map(async part => {
                const nodeId = hwv.model.createNode(rootNode, part.filename);
                await hwv.model.loadSubtreeFromScsFile(nodeId, part.scs_url);
                return { nodeId, part };
              }));
              loadedParts.push(...rest);
            }

            for (const { nodeId, part } of loadedParts) {
              let center = [0,0,0], diag = 0;
              try {
                const box = await hwv.model.getNodeRealBoundingBox(nodeId);
                center = [(box.min.x+box.max.x)/2,(box.min.y+box.max.y)/2,(box.min.z+box.max.z)/2];
                diag = Math.sqrt((box.max.x-box.min.x)**2+(box.max.y-box.min.y)**2+(box.max.z-box.min.z)**2);
              } catch(e) {}
              const label = document.createElement('div');
              label.className = 'part-label';
              label.textContent = part.filename;
              labelsRoot.appendChild(label);
              partState.push({ nodeId, position: part.position, center, diag, label });
            }

            setupSlider();
            applyPositions();
            applyClusterColors();

            // Restore any cluster_tag already saved in the map JSON
            if (mapData.parts.some(p => p.cluster_tag)) {
              const thresh   = parseFloat(edgeThresh.value) || 0;
              const clusters = computeClusters(mapData.matrix, thresh);
              partState.forEach((st, i) => {
                const tag = mapData.parts[i]?.cluster_tag;
                if (tag) clusterTags[clusters[i]] = tag;
              });
              updateClusterTagLabels();
              saveTagsRow.style.display = '';
            }

            if (hwv.view.fitWorld) hwv.view.fitWorld();
            spinner.style.display = 'none';
          } catch(e) {
            showError("Failed to load models: " + (e.message || e));
          }
        },
      });

      try {
        const started = hwv.start();
        if (started && typeof started.catch === 'function')
          started.catch(err => showError(err.message || String(err)));
      } catch(err) { showError(err.message || String(err)); }
    }

    main();
  </script>
</body>
</html>
